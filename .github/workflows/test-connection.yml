name: API 테스트 (진단용)

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests

      - name: 식약처 OpenAPI 테스트
        env:
          MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
        run: |
          python << 'EOF'
          import os, urllib.parse, requests
          key = urllib.parse.unquote(os.environ["MFDS_API_KEY"])
          url = "http://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtPrmsnInq07"
          params = {"serviceKey": key, "type": "json", "numOfRows": 5, "pageNo": 1}
          try:
              r = requests.get(url, params=params, timeout=20)
              print("STATUS:", r.status_code)
              print("HEAD:", r.text[:300])
              try:
                  body = r.json()["body"]
                  print("TOTAL:", body.get("totalCount"))
                  items = body["items"]
                  rows = items if isinstance(items, list) else [items]
                  print("FIELDS:", list(rows[0].keys()))
                  for it in rows:
                      print("ROW:", it.get("ITEM_NAME"), "|", it.get("ITEM_PERMIT_DATE"))
              except Exception as pe:
                  print("PARSE-ISSUE:", repr(pe))
          except Exception as e:
              print("ERROR:", repr(e))
          EOF
