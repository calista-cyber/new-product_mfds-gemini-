name: Weekly Drug Approval & AI Analysis

on:
  schedule:
    # 한국 시간 토요일 22:00 (UTC 13:00) 맞춰둠!
    - cron: '0 13 * * 6'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v3

      - name: 2. 파이썬 설정 (3.11 사용)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 가상 서버에 크롬 브라우저 설치 (에러 방지용)
      - name: 3. 크롬 브라우저 설치
        uses: browser-actions/setup-chrome@latest

      # 누락되었던 openai 라이브러리 추가!
      - name: 4. 필수 라이브러리 설치
        run: |
          pip install requests beautifulsoup4 gspread google-auth selenium webdriver-manager openai pytz

      - name: 5. 데이터 수집 (Scraper)
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
        run: python scraper.py

      - name: 6. AI 데이터 분석 (OpenAI)
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python ai_analyst.py
